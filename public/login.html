<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Nexxuz APK Distributor</title>
    <link href="/assets/css/style.css" rel="stylesheet" />
    <script src="/assets/js/lucide-script.js"></script>
</head>
<body class="login-wrapper">
    <div class="login-container">
        <header class="text-center">
            <div class="login-header-icon">
                <i data-lucide="shield" style="width:2.5rem; height:2.5rem"></i>
            </div>
            <h1 class="title-main">Security Check</h1>
            <p class="text-slate-400 text-sm">Masuk untuk mengakses sistem APK Distributor</p>
        </header>

        <div class="glass-card" style="padding: 2rem">
            <form id="login-form" autocomplete="off" style="display:flex; flex-direction:column; gap:1.25rem">
                <div id="error-message" class="hidden alert-error">
                    <i data-lucide="alert-circle" style="width:1rem; height:1rem"></i>
                    <span>Username atau Password salah</span>
                </div>
                
                <div class="flex-col gap-4">
                    <div style="margin-bottom:1rem">
                        <label class="input-label" for="username">Username</label>
                        <div class="relative">
                            <i data-lucide="user" class="input-icon" style="width:1.25rem; height:1.25rem"></i>
                            <input type="text" id="username" name="username" required placeholder="Masukkan username" 
                                class="input-field" />
                        </div>
                    </div>
                
                    <div>
                        <label class="input-label" for="password">Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="input-icon" style="width:1.25rem; height:1.25rem"></i>
                            <input type="password" id="password" name="password" required placeholder="Masukkan password" 
                                class="input-field" />
                        </div>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="margin-top: 1rem">
                    <span id="btn-text">Masuk Sekarang</span>
                    <i data-lucide="arrow-right" style="width:1rem; height:1rem; margin-left:0.25rem"></i>
                </button>
            </form>
        </div>
        
        <footer class="text-center text-slate-600 text-xs">
            Nexxuz APK Distributor &copy; 2026
        </footer>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            
            // Loading state
            const origHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" style="width:1.25rem; height:1.25rem" class="animate-spin"></i><span>Memverifikasi...</span>';
            lucide.createIcons();
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                if (res.ok) {
                    btn.className = 'btn btn-success';
                    btn.innerHTML = '<i data-lucide="check-circle" style="width:1.25rem; height:1.25rem"></i><span>Berhasil! Mengalihkan...</span>';
                    lucide.createIcons();
                    
                    setTimeout(() => { window.location.href = '/'; }, 800);
                } else {
                    const data = await res.json();
                    errorMsg.querySelector('span').textContent = data.error || 'Username atau password salah';
                    errorMsg.classList.remove('hidden');
                    
                    // Reset state
                    btn.disabled = false;
                    btn.innerHTML = origHTML;
                    btn.className = 'btn btn-primary';
                    lucide.createIcons();
                }
            } catch (err) {
                // Reset state on network error
                errorMsg.querySelector('span').textContent = 'Kesalahan jaringan. Coba lagi.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = origHTML;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
